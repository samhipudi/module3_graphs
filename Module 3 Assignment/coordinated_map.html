<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Global Nuclear Energy — Coordinated Views</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b10;--surface:#0e1420;--surface2:#131927;
  --border:#1a2235;--border2:#243050;
  --accent:#00e5ff;--accent2:#ff6b35;--accent3:#7fff6e;
  --text:#dde4f0;--muted:#4a5570;--muted2:#6a7a9a;
  --coal:#7a6a5a;--oil:#c4852a;--gas:#3a85c8;
  --nuclear:#00e5ff;--renew:#7fff6e;
}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── HEADER ─────────────────────────────────────── */
header{
  padding:12px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.brand{display:flex;align-items:baseline;gap:16px}
.brand h1{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.05em;color:var(--text);line-height:1}
.brand .sub{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}
.coord-badge{
  font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;
  background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.3);
  color:var(--accent);padding:4px 10px;border-radius:2px;
}

/* ── MAIN LAYOUT ────────────────────────────────── */
.layout{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr auto;flex:1;min-height:0;gap:0}

/* ── MAP PANEL ──────────────────────────────────── */
.map-panel{
  grid-column:1;grid-row:1;border-right:1px solid var(--border);
  position:relative;overflow:hidden;
}
#map-svg{width:100%;height:100%}
.map-label{
  position:absolute;top:10px;left:14px;
  font-family:'IBM Plex Mono',monospace;font-size:.58rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
}
.map-event-badge{
  position:absolute;top:10px;right:14px;
  background:rgba(255,107,53,.12);border:1px solid var(--accent2);
  color:var(--accent2);font-family:'IBM Plex Mono',monospace;
  font-size:.58rem;padding:3px 8px;border-radius:2px;
  letter-spacing:.08em;transition:opacity .3s;pointer-events:none;
}

/* ── BAR PANEL ──────────────────────────────────── */
.bar-panel{
  grid-column:2;grid-row:1;
  display:flex;flex-direction:column;overflow:hidden;position:relative;min-height:0;
}
.bar-label{
  position:absolute;top:10px;left:14px;
  font-family:'IBM Plex Mono',monospace;font-size:.58rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  z-index:10;
}
#bar-svg{width:100%;flex:1;display:block;min-height:0;}

/* ── CONTROL BAR ────────────────────────────────── */
.control-bar{
  grid-column:1/-1;grid-row:2;
  border-top:1px solid var(--border);
  display:flex;align-items:center;gap:20px;padding:10px 24px;
  background:var(--surface);flex-shrink:0;
}
.year-big{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--accent);line-height:1;min-width:70px}
.slider-wrap{flex:1;display:flex;flex-direction:column;gap:4px}
input[type=range]{
  -webkit-appearance:none;width:100%;height:3px;
  background:var(--border2);border-radius:2px;outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  background:var(--accent);border-radius:50%;cursor:pointer;
  box-shadow:0 0 8px rgba(0,229,255,.5);
}
.slider-labels{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--muted)}
.play-btn{
  background:none;border:1px solid var(--border2);color:var(--text);
  font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:.1em;
  padding:7px 14px;cursor:pointer;border-radius:2px;white-space:nowrap;
  transition:border-color .2s,color .2s;
}
.play-btn:hover{border-color:var(--accent);color:var(--accent)}
.play-btn.playing{border-color:var(--accent2);color:var(--accent2)}

/* legend row */
.legend-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:.6rem;color:var(--muted2)}
.leg-swatch{width:10px;height:10px;border-radius:1px;flex-shrink:0}

/* country toggles */
.country-toggles{display:flex;gap:6px;flex-shrink:0}
.ctry-btn{
  background:none;border:1px solid var(--border2);color:var(--muted2);
  font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.06em;
  padding:4px 8px;cursor:pointer;border-radius:2px;transition:.2s;
}
.ctry-btn.active{background:rgba(255,255,255,.06);border-color:var(--border2)}

/* ── TOOLTIP ────────────────────────────────────── */
#tooltip{
  position:fixed;pointer-events:none;
  background:#0e1420ee;border:1px solid var(--border2);border-left:3px solid var(--accent);
  padding:8px 12px;font-size:.72rem;max-width:190px;
  opacity:0;transition:opacity .15s;z-index:200;
}
#tooltip .tip-h{font-weight:600;font-size:.8rem;margin-bottom:3px}
#tooltip .tip-v{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--accent)}
#tooltip .tip-s{color:var(--muted2);font-size:.62rem}

/* country paths */
.cpth{stroke:#1a2235;stroke-width:.4px;cursor:pointer;transition:fill .35s}
.cpth:hover{stroke:var(--accent);stroke-width:1px}
.cpth.us-hl{stroke:var(--accent2);stroke-width:1.6px}
.cpth.selected{stroke:white;stroke-width:1.4px}
</style>
</head>

<header>
  <div class="brand">
    <h1>Global Nuclear &amp; Energy Mix</h1>
    <span class="sub">IEA World Energy Balances</span>
  </div>
</header>

<div class="layout">

  <!-- MAP VIEW -->
  <div class="map-panel" id="map-panel">
    <div class="map-label">Nuclear Supply by Country (PJ) · Click country to compare</div>
    <div class="map-event-badge" id="event-badge" style="opacity:0"></div>
    <svg id="map-svg"></svg>
  </div>

  <!-- BAR VIEW -->
  <div class="bar-panel">

    <svg id="bar-svg"></svg>
  </div>

  <!-- SHARED CONTROL BAR -->
  <div class="control-bar">
    <div class="year-big" id="year-label">2023</div>

    <div class="slider-wrap">

      <div class="slider-labels"><span>1971</span><span>1980</span><span>1990</span><span>2000</span><span>2010</span><span>2023</span></div>
    </div>

    <button class="play-btn" id="play-btn">▶ PLAY</button>

    <div style="display:flex;flex-direction:column;gap:6px">
      <div class="legend-row">
        <div class="leg-item"><div class="leg-swatch" style="background:var(--coal)"></div>Coal</div>
        <div class="leg-item"><div class="leg-swatch" style="background:var(--oil)"></div>Oil</div>
        <div class="leg-item"><div class="leg-swatch" style="background:var(--gas)"></div>Nat. Gas</div>
        <div class="leg-item"><div class="leg-swatch" style="background:var(--nuclear)"></div>Nuclear</div>
        <div class="leg-item"><div class="leg-swatch" style="background:var(--renew)"></div>Renewables</div>
      </div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--muted)">
        Click map country to add/remove · Drag map · Scroll to zoom
      </div>
    </div>
  </div>

</div>

<div id="tooltip"><div class="tip-h" id="tip-h"></div><div id="tip-v"></div><div id="tip-s"></div></div>

// data lookup: isoName → nuclear PJ (TopoJSON name → CSV name)
function getNuclear(isoName,year){
  const nameMap = {'United States of America':'United States','South Korea':'Korea','China':"People's Republic of China"};
  const dKey = nameMap[isoName] || isoName;
  return (NUCLEAR_DATA[dKey]||{})[year]||0;
}
// isoName → mix data key (TopoJSON name → CSV name)
function getMixKey(isoName){
  const rev={'United States of America':'United States','South Korea':'Korea','China':"People's Republic of China"};
  return rev[isoName]||isoName;
}

// Load CSV data first, then world topojson
d3.csv('WorldEnergyBalances_Clean.csv').then(csvData => {
    // Filter for Total energy supply flow for all products
    const energyRows = csvData.filter(row => 
      row.Flow === 'Total energy supply (PJ)'
    );
    
    // Build NUCLEAR_DATA and MIX_DATA objects
    energyRows.forEach(row => {
      const country = row.Country;
      const product = row.Product;
      
      // Extract year columns (1971-2023)
      const yearData = {};
      for (let year = 1971; year <= 2023; year++) {
        const yearStr = String(year);
        const value = parseFloat(row[yearStr]) || 0;
        yearData[yearStr] = value;
      }
      
      // Store nuclear data separately
      if (product === 'Nuclear') {
        NUCLEAR_DATA[country] = yearData;
      }
      
      // Store all energy mix data
      if (SEGMENTS.includes(product)) {
        if (!MIX_DATA[country]) {
          MIX_DATA[country] = {};
        }
        MIX_DATA[country][product] = yearData;
      }
    });
    
    console.log('Loaded nuclear data for', Object.keys(NUCLEAR_DATA).length, 'countries');
    console.log('Loaded energy mix data for', Object.keys(MIX_DATA).length, 'countries');
    
    // Now load the world map
    return d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  }).then(world=>{
  const countries=topojson.feature(world,world.objects.countries);
  mapG.selectAll('.cpth')
    .data(countries.features)
    .join('path')
    .attr('class',d=>{
      const n=COUNTRY_NAMES[+d.id];
      return 'cpth'+(n==='United States of America'?' us-hl':'');
    })
    .attr('d',geoPath)
    .on('click',(event,d)=>{
      const isoName=COUNTRY_NAMES[+d.id];
      const mixKey=getMixKey(isoName);
      if(!MIX_DATA[mixKey]) return; // no mix data for this country
      if(FIXED.has(mixKey)) return;  // US & China always shown
      if(selectedMix.has(mixKey)) selectedMix.delete(mixKey);
      else selectedMix.add(mixKey);
      updateSelectionHighlight();
      renderBars();
    })
    .on('mousemove',(event,d)=>{
      const n=COUNTRY_NAMES[+d.id];
      const v=getNuclear(n,YEARS[yearIdx]);
      const mk=getMixKey(n);
      const hasMix=!!MIX_DATA[mk];
      document.getElementById('tip-h').textContent=n||'Unknown';
      document.getElementById('tip-v').innerHTML=v>0
        ?`<span style="color:var(--accent)">${v.toLocaleString()} PJ</span> nuclear`
        :`<span style="color:var(--muted2)">No nuclear supply</span>`;
      document.getElementById('tip-s').textContent=hasMix?'Click to toggle in bar chart':'';
      tooltip.style.opacity=1;
      tooltip.style.left=(event.clientX+14)+'px';
      tooltip.style.top=(event.clientY-10)+'px';
    })
    .on('mouseleave',()=>{tooltip.style.opacity=0});
  // Add color legend (positioned in bottom-left)
  const legendG = mapSvg.append('g')
    .attr('class', 'legend');
  
  // Legend gradient
  const defs = mapSvg.append('defs');
  const gradient = defs.append('linearGradient')
    .attr('id', 'nuclear-gradient')
    .attr('x1', '0%').attr('y1', '100%')
    .attr('x2', '0%').attr('y2', '0%');
  
  // Create gradient stops
  const stops = [0, 0.25, 0.5, 0.75, 1];
  stops.forEach(t => {
    gradient.append('stop')
      .attr('offset', `${t * 100}%`)
      .attr('stop-color', nuclearColor(t * 9200));
  });
  
  // Legend rectangle
  const legendHeight = 120;
  const legendWidth = 20;
  legendG.append('rect')
    .attr('width', legendWidth)
    .attr('height', legendHeight)
    .style('fill', 'url(#nuclear-gradient)')
    .attr('stroke', '#3a4a5a')
    .attr('stroke-width', 1);
  
  // Legend labels
  const legendScale = d3.scaleLinear()
    .domain([0, 9200])
    .range([legendHeight, 0]);
  
  const legendAxis = d3.axisRight(legendScale)
    .ticks(5)
    .tickFormat(d => d === 0 ? '0' : `${(d/1000).toFixed(0)}k`);
  
  legendG.append('g')
    .attr('transform', `translate(${legendWidth}, 0)`)
    .call(legendAxis)
    .call(g => {
      g.select('.domain').attr('stroke', '#3a4a5a');
      g.selectAll('line').attr('stroke', '#3a4a5a');
      g.selectAll('text')
        .attr('fill', '#dde4f0')
        .attr('font-family', 'IBM Plex Mono, monospace')
        .attr('font-size', 10);
    });
  
  // Legend title
  legendG.append('text')
    .attr('x', 0)
    .attr('y', -8)
    .attr('fill', '#dde4f0')
    .attr('font-family', 'IBM Plex Sans, sans-serif')
    .attr('font-size', 11)
    .attr('font-weight', 500)
    .text('Nuclear (PJ)');
  
  resizeMap();
  window.addEventListener('resize',()=>{resizeMap();renderBars()});
  updateMap();
  // Delay first renderBars to ensure panel has been painted
  setTimeout(renderBars, 100);
  setTimeout(renderBars, 400);
}).catch(error => {
  console.error('Error loading data:', error);
  alert('Error loading data. Please ensure the CSV file is in the same directory as this HTML file.');
});

function updateSelectionHighlight(){
  mapG.selectAll('.cpth').classed('selected',d=>{
    const n=COUNTRY_NAMES[+d.id];
    const mk=getMixKey(n);
    return selectedMix.has(mk)&&!FIXED.has(mk);
  });
}

// ════════════════════════════════════════════════════
// BAR CHART (Task 3)
// ════════════════════════════════════════════════════
const barSvg = d3.select('#bar-svg');
let barW=0,barH=0;

function renderBars(){
  const panel = document.querySelector('.bar-panel');
  barW = panel.offsetWidth;
  barH = panel.offsetHeight - 30; // subtract label area
  if(barW < 20 || barH < 20){ setTimeout(renderBars, 150); return; }

  const year = YEARS[yearIdx];
  const countries = [...selectedMix].filter(c => MIX_DATA[c]);
  const pad = {t:44, r:24, b:52, l:64};
  const innerW = barW - pad.l - pad.r;
  const innerH = barH - pad.t - pad.b;

  // Build rows
  const rows = countries.map(c => {
    const row = {country: c};
    let total = 0;
    SEGMENTS.forEach(s => {
      const v = ((MIX_DATA[c] || {})[s] || {})[year] || 0;
      row[s] = v; total += v;
    });
    row._total = total;
    return row;
  });

  const maxTotal = d3.max(rows, d => d._total) || 1;
  const x = d3.scaleBand().domain(countries).range([0, innerW]).padding(0.28);
  const y = d3.scaleLinear().domain([0, maxTotal * 1.25]).range([innerH, 0]);

  barSvg.attr('width', barW).attr('height', barH)
    .attr('viewBox', `0 0 ${barW} ${barH}`);
  barSvg.selectAll('*').remove();
  const g = barSvg.append('g').attr('transform', `translate(${pad.l},${pad.t})`);

  // Background
  g.append('rect').attr('width', innerW).attr('height', innerH)
    .attr('fill', '#0a0f1a').attr('rx', 2);

  // Grid lines
  y.ticks(5).forEach(tick => {
    g.append('line')
      .attr('x1', 0).attr('x2', innerW)
      .attr('y1', y(tick)).attr('y2', y(tick))
      .attr('stroke', '#1a2235').attr('stroke-width', 1);
  });

  // Stacked bars
  rows.forEach(row => {
    let cumulative = 0;
    SEGMENTS.forEach(seg => {
      const val = row[seg] || 0;
      if(val <= 0) return;
      const yTop = y(cumulative + val);
      const yBottom = y(cumulative);
      const bh = yBottom - yTop;
      cumulative += val;
      g.append('rect')
        .attr('x', x(row.country))
        .attr('y', yTop)
        .attr('width', x.bandwidth())
        .attr('height', bh)
        .attr('fill', SEG_COLORS[seg])
        .attr('opacity', 0.9)
        .on('mousemove', (event) => {
          const pct = row._total > 0 ? ((val/row._total)*100).toFixed(1) : '0';
          document.getElementById('tip-h').textContent = `${row.country} — ${SEG_LABELS[seg]}`;
          document.getElementById('tip-v').innerHTML = `<span style="color:var(--accent)">${val.toLocaleString()} PJ</span>`;
          document.getElementById('tip-s').textContent = `${pct}% of total supply`;
          tooltip.style.opacity = 1;
          tooltip.style.left = (event.clientX + 14) + 'px';
          tooltip.style.top  = (event.clientY - 10) + 'px';
        })
        .on('mouseleave', () => { tooltip.style.opacity = 0; });
    });
  });

  // Total labels removed per user request

  // X axis
  g.append('g').attr('transform', `translate(0,${innerH})`)
    .call(d3.axisBottom(x).tickSize(0))
    .call(ax => {
      ax.select('.domain').remove();
      ax.selectAll('text')
        .attr('font-family','IBM Plex Sans, sans-serif')
        .attr('font-size', 11).attr('fill','#dde4f0').attr('dy','1.4em');
    });

  // Y axis
  g.append('g')
    .call(d3.axisLeft(y).ticks(5).tickFormat(d => `${(d/1000).toFixed(0)}k`))
    .call(ax => {
      ax.select('.domain').remove();
      ax.selectAll('line').attr('stroke','#1a2235');
      ax.selectAll('text').attr('font-family','IBM Plex Mono, monospace')
        .attr('font-size', 9).attr('fill','#4a5570');
    });

  // Y label
  g.append('text').attr('transform','rotate(-90)')
    .attr('x', -innerH/2).attr('y', -50)
    .attr('text-anchor','middle')
    .attr('font-family','IBM Plex Mono, monospace')
    .attr('font-size', 8).attr('fill','#4a5570')
    .text('Total Energy Supply (PJ)');

  if(countries.length === 0){
    g.append('text').attr('x', innerW/2).attr('y', innerH/2)
      .attr('text-anchor','middle').attr('fill','#4a5570')
      .attr('font-size', 13)
      .text('Click a country on the map to compare');
  }
}

// ════════════════════════════════════════════════════
// MAP UPDATE
// ════════════════════════════════════════════════════
function updateMap(){
  const year=YEARS[yearIdx];
  yearLabel.textContent=year;
  barYear.textContent=year;
  slider.value=yearIdx;
  evBadge.textContent=EVENTS[year]||'';
  evBadge.style.opacity=EVENTS[year]?1:0;

  mapG.selectAll('.cpth')
    .transition().duration(playing?300:150)
    .attr('fill',d=>{
      const n=COUNTRY_NAMES[+d.id];
      return nuclearColor(getNuclear(n,year));
    });
  updateSelectionHighlight();
}

// ════════════════════════════════════════════════════
// SHARED UPDATE — called when year changes
// ════════════════════════════════════════════════════
function update(){
  updateMap();
  renderBars();
}

// ════════════════════════════════════════════════════
// CONTROLS
// ════════════════════════════════════════════════════
slider.addEventListener('input',()=>{
  yearIdx=+slider.value;
  update();
});

playBtn.addEventListener('click',()=>{
  playing=!playing;
  playBtn.textContent=playing?'⏸ PAUSE':'▶ PLAY';
  playBtn.classList.toggle('playing',playing);
  if(playing){
    if(yearIdx>=52) yearIdx=0;
    timer=setInterval(()=>{
      yearIdx++;
      update();
      if(yearIdx>=52){clearInterval(timer);playing=false;playBtn.textContent='▶ PLAY';playBtn.classList.remove('playing')}
    },400);
  } else { clearInterval(timer); }
});

// ResizeObserver ensures first render after layout
const _barPanel=document.getElementById('bar-svg').parentElement;
new ResizeObserver(()=>{renderBars();}).observe(_barPanel);
</script>
